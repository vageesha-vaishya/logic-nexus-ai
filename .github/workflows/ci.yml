name: CI - Quality Checks

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install PostgreSQL client
      run: sudo apt-get update && sudo apt-get install -y postgresql-client

    - name: Linting
      run: npm run lint

    - name: Type Checking
      run: npm run typecheck

    - name: Unit Tests
      run: npm run test

    - name: Seed Integrity Check (QUO-260309-00001)
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      run: |
        test -n "$SUPABASE_DB_URL" || (echo "Missing required secret: SUPABASE_DB_URL" && exit 1)
        npm run seed:verify:quo260309

    - name: Build Test
      run: npm run build
