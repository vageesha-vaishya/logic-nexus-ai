name: E2E Quotation Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
        project: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run quotation E2E suite
        env:
          PLAYWRIGHT_ENV: staging
          PLAYWRIGHT_USE_MOCK_API: true
          PLAYWRIGHT_REUSE_EXISTING_SERVER: false
          E2E_ADMIN_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: npm run test:playwright:quotation -- --project=${{ matrix.project }} --shard=${{ matrix.shard }}/2
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: quotation-e2e-report-${{ matrix.project }}-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30
